name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (OpenWisprCore)
    # macos-15 ships Xcode 16 with Swift 6.1 (matches our
    # swift-tools-version in Package.swift). macos-14 has Swift 5.10
    # and fails immediately.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain
        run: |
          swift --version
          xcodebuild -version

      # OpenWisprCore has zero non-Foundation deps, so we can run its
      # tests without the heavy bootstrap of Moonshine.xcframework.
      # Integration tests (which need the xcframework and a real
      # Moonshine build) are run locally only — they require ~3 min of
      # cmake setup that's wasteful for every PR.
      - name: swift test --filter OpenWisprCoreTests
        run: swift test --filter OpenWisprCoreTests
