name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (OpenWisprCore)
    # macos-15 ships Xcode 16 with Swift 6.1.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain
        run: |
          swift --version
          xcodebuild -version

      # OpenWisprCore is its own Swift package at ./Core with zero
      # external dependencies. We test it standalone so CI never
      # needs to build Moonshine.xcframework (which is a 3-min cmake
      # build and currently fails on macos-15 due to a cross-arch
      # linker quirk in moonshine's build-swift.sh).
      #
      # Integration tests for the app target (which exercise
      # MoonshineVoice + a real model) are run locally only.
      - name: swift test (OpenWisprCore)
        working-directory: Core
        run: swift test
